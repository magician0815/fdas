# FDAS Alembic配置
# 金融数据抓取与分析系统 - 数据库迁移配置

[alembic]
# 迁移脚本目录
script_location = alembic

# 版本文件模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s

# 是否使用双引号包裹标识符
# quote_schema = false

# SQLAlchemy URL（从环境变量读取，由env.py处理）
# sqlalchemy.url = postgresql+asyncpg://fdas:fdas@localhost:5432/fdas

# 迁移文件编码
output_encoding = utf-8

[post_write_hooks]
# 迁移文件生成后执行的钩子

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S